<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS PRO | Admin Control Room</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="bg-[#020617] text-white p-4 md:p-8 font-sans">
    
    <div class="max-w-6xl mx-auto relative z-10">
        <h1 class="text-3xl font-black mb-8 text-blue-500 italic uppercase">Boss Control Room</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-900/50 p-6 rounded-3xl border border-blue-500/30 shadow-lg">
                <h2 class="text-xl font-bold mb-6 text-blue-400 flex items-center gap-2">
                    <i class="fa-solid fa-money-bill-trend-up"></i> Pending Deposits
                </h2>
                <div id="depositList" class="space-y-4">
                    <p class="text-gray-500 italic">Loading requests...</p>
                </div>
            </div>

            <div class="bg-gray-900/50 p-6 rounded-3xl border border-green-500/30 shadow-lg">
                <h2 class="text-xl font-bold mb-6 text-green-400 flex items-center gap-2">
                    <i class="fa-solid fa-building-columns"></i> Pending Withdrawals
                </h2>
                <div id="withdrawList" class="space-y-4">
                    <p class="text-gray-500 italic">Loading requests...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="customConfirm" class="fixed inset-0 z-[60000] bg-[#020617]/90 backdrop-blur-md flex flex-col items-center justify-center p-6 transition-opacity duration-300" style="display: none; opacity: 0;">
        <div id="confirmBox" class="glass p-8 rounded-[2.5rem] text-center w-full max-w-sm border-t-4 border-blue-500 bg-gradient-to-br from-[#0f172a] to-[#020617] shadow-2xl transform scale-95 transition-transform duration-300">
            <h2 id="confirmTitle" class="text-2xl font-black italic text-blue-500 mb-2 uppercase">Confirm Action</h2>
            <p id="confirmMessage" class="text-sm font-bold text-gray-400 mb-8 leading-relaxed">Are you sure you want to do this?</p>
            <div class="flex gap-4">
                <button id="btnCancel" class="flex-1 bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition">Cancel</button>
                <button id="btnConfirm" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition">Confirm</button>
            </div>
        </div>
    </div>

    <div id="customAlert" class="fixed inset-0 z-[70000] bg-[#020617]/90 backdrop-blur-md flex flex-col items-center justify-center p-6 transition-opacity duration-300" style="display: none; opacity: 0;">
        <div id="alertBox" class="glass p-8 rounded-[2.5rem] text-center w-full max-w-sm border-t-4 border-green-500 bg-gradient-to-br from-[#0f172a] to-[#020617] shadow-2xl transform scale-95 transition-transform duration-300">
            <h2 id="alertTitle" class="text-2xl font-black italic text-green-500 mb-2 uppercase">Success</h2>
            <p id="alertMessage" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-8 leading-relaxed">Action completed.</p>
            <button onclick="closeAlert()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition">OKAY</button>
        </div>
    </div>

    <script>
        // TERI FIREBASE KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyBtJQ79z9JRKsFHO8_1NV1T2PZZcBC-gyc",
            authDomain: "nexuspro-c74a4.firebaseapp.com",
            projectId: "nexuspro-c74a4",
            storageBucket: "nexuspro-c74a4.firebasestorage.app",
            messagingSenderId: "324638680474",
            appId: "1:324638680474:web:2ad8bc60a0445d7f49c623"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==========================================
        // SMART UI POPUP LOGIC
        // ==========================================
        function customConfirmBox(title, msg, confirmText, confirmColor) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('customConfirm');
                const box = document.getElementById('confirmBox');
                const btnConfirm = document.getElementById('btnConfirm');
                
                document.getElementById('confirmTitle').innerText = title;
                document.getElementById('confirmMessage').innerText = msg;
                btnConfirm.innerText = confirmText;
                
                // Color Logic based on action
                document.getElementById('confirmTitle').className = `text-2xl font-black italic mb-2 uppercase text-${confirmColor}-500`;
                box.className = `glass p-8 rounded-[2.5rem] text-center w-full max-w-sm border-t-4 border-${confirmColor}-500 bg-gradient-to-br from-[#0f172a] to-[#020617] shadow-2xl transform scale-95 transition-transform duration-300`;
                btnConfirm.className = `flex-1 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition bg-${confirmColor}-600 hover:bg-${confirmColor}-500 shadow-${confirmColor}-500/30`;

                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.opacity = '1'; box.style.transform = 'scale(1)'; }, 10);

                document.getElementById('btnCancel').onclick = () => { closeConfirm(); resolve(false); };
                btnConfirm.onclick = () => { closeConfirm(); resolve(true); };

                function closeConfirm() {
                    overlay.style.opacity = '0';
                    box.style.transform = 'scale(0.9)';
                    setTimeout(() => { overlay.style.display = 'none'; }, 300);
                }
            });
        }

        function showCustomAlert(title, msg, color) {
            const alertOverlay = document.getElementById('customAlert');
            const alertBox = document.getElementById('alertBox');
            
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = msg;
            
            document.getElementById('alertTitle').className = `text-2xl font-black italic mb-2 uppercase text-${color}-500`;
            alertBox.className = `glass p-8 rounded-[2.5rem] text-center w-full max-w-sm border-t-4 border-${color}-500 bg-gradient-to-br from-[#0f172a] to-[#020617] shadow-2xl transform scale-95 transition-transform duration-300`;
            alertBox.querySelector('button').className = `w-full py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg active:scale-95 transition bg-${color}-600 hover:bg-${color}-500`;

            alertOverlay.style.display = 'flex';
            setTimeout(() => { alertOverlay.style.opacity = '1'; alertBox.style.transform = 'scale(1)'; }, 10);
        }

        function closeAlert() {
            const alertOverlay = document.getElementById('customAlert');
            const alertBox = document.getElementById('alertBox');
            alertOverlay.style.opacity = '0';
            alertBox.style.transform = 'scale(0.9)';
            setTimeout(() => { alertOverlay.style.display = 'none'; }, 300);
        }

        // ==========================================
        // 1. RENDER DEPOSIT REQUESTS
        // ==========================================
        db.collection('deposits').where('status', '==', 'pending').onSnapshot(snapshot => {
            const list = document.getElementById('depositList'); 
            if(snapshot.empty) { list.innerHTML = "<p class='text-gray-500 italic'>Koi naya deposit nahi hai.</p>"; return; }
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="bg-black/40 p-5 rounded-2xl border border-white/5">
                        <div class="mb-4">
                            <p class="font-black text-white text-lg">${data.userId}</p>
                            <p class="text-sm text-yellow-400 font-bold tracking-widest mt-1">UTR: ${data.utr}</p>
                            <p class="text-sm text-gray-400 mt-1">Amount: <span class="text-white font-bold text-lg">₹${data.amount}</span></p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="approveDep('${doc.id}', '${data.userId}', ${data.amount})" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-xl text-[10px] font-black uppercase transition-colors">
                                <i class="fa-solid fa-check"></i> Approve
                            </button>
                            <button onclick="rejectDep('${doc.id}')" class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-xl text-[10px] font-black uppercase transition-colors">
                                <i class="fa-solid fa-xmark"></i> Reject
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // ==========================================
        // 2. RENDER WITHDRAWAL REQUESTS
        // ==========================================
        db.collection('withdrawals').where('status', '==', 'pending').onSnapshot(snapshot => {
            const list = document.getElementById('withdrawList'); 
            if(snapshot.empty) { list.innerHTML = "<p class='text-gray-500 italic'>Koi naya withdrawal nahi hai.</p>"; return; }
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="bg-black/40 p-5 rounded-2xl border border-white/5">
                        <div class="mb-4">
                            <p class="font-black text-white text-lg">${data.userId}</p>
                            <p class="text-sm text-green-400 font-bold tracking-widest mt-1">UPI: ${data.upi}</p>
                            <p class="text-sm text-gray-400 mt-1">Pay Amount: <span class="text-white font-bold text-lg">₹${data.amount}</span></p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="approveWith('${doc.id}')" class="flex-1 bg-green-600 hover:bg-green-500 py-3 rounded-xl text-[10px] font-black uppercase transition-colors">
                                <i class="fa-solid fa-check"></i> Mark Paid
                            </button>
                            <button onclick="rejectWith('${doc.id}', '${data.userId}', ${data.amount})" class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-xl text-[10px] font-black uppercase transition-colors">
                                <i class="fa-solid fa-xmark"></i> Refund
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // ==========================================
        // ACTION BUTTON LOGIC
        // ==========================================
        
        async function approveDep(docId, userId, amt) {
            const confirm = await customConfirmBox("Approve Deposit", `Kya sach mein Bank me ₹${amt} aa gaye hain? (ID: ${userId})`, "APPROVE", "blue");
            if(!confirm) return;
            
            await db.collection('users').doc(userId).set({ bonusBal: firebase.firestore.FieldValue.increment(amt) }, { merge: true });
            await db.collection('deposits').doc(docId).update({ status: 'approved' });
            showCustomAlert("Success!", `Boom! ₹${amt} added to ${userId}'s account.`, "green");
        }

        async function rejectDep(docId) {
            const confirm = await customConfirmBox("Reject Deposit", "Fake UTR hai? Reject kar dein?", "REJECT", "red");
            if(!confirm) return;
            
            await db.collection('deposits').doc(docId).update({ status: 'rejected' });
            showCustomAlert("Rejected", "Deposit Rejected! UTR garbage mein daal diya.", "red");
        }

        async function approveWith(docId) {
            const confirm = await customConfirmBox("Mark Paid", "Kya tune sach mein apni UPI se isko paise bhej diye hain?", "MARK PAID", "green");
            if(!confirm) return;
            
            await db.collection('withdrawals').doc(docId).update({ status: 'paid' });
            showCustomAlert("Paid!", "Done! Payout successful.", "green");
        }

        async function rejectWith(docId, userId, amt) {
            const confirm = await customConfirmBox("Reject & Refund", `Withdrawal reject karna hai? ₹${amt} user ko wapas mil jayenge.`, "REFUND", "red");
            if(!confirm) return;
            
            await db.collection('users').doc(userId).set({ winBal: firebase.firestore.FieldValue.increment(amt) }, { merge: true });
            await db.collection('withdrawals').doc(docId).update({ status: 'rejected' });
            showCustomAlert("Refunded", `Rejected! ₹${amt} refunded to ${userId}.`, "red");
        }
    </script>
</body>
</html>
