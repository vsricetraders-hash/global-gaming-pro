<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | International Gaming League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030303; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .game-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .game-card:active { scale: 0.95; }
        .neon-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        #gameArena { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
        canvas { background: #050505; display: block; margin: 0 auto; touch-action: none; }
    </style>
</head>
<body class="p-4">

    <div id="mainDashboard">
        <header class="flex justify-between items-center mb-8 pt-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">NEXUS<span class="text-white">PRO</span></h1>
                <p class="text-[8px] text-gray-500 tracking-widest font-bold uppercase">Multi-Arena Network</p>
            </div>
            <div class="glass px-4 py-2 rounded-2xl border-blue-500/20">
                <p class="text-[8px] text-gray-400">WALLET</p>
                <p class="text-xs font-black text-green-400">₹0.00</p>
            </div>
        </header>

        <h3 class="text-[10px] font-black uppercase text-blue-400 mb-4 tracking-widest">Select Arena</h3>
        
        <div class="space-y-4">
            <div onclick="initGame('cyberJump')" class="game-card glass p-4 rounded-[2rem] border-l-4 border-blue-500 flex items-center justify-between">
                <div>
                    <span class="text-[8px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded-full font-bold uppercase">Speed</span>
                    <h4 class="text-xl font-black mt-1 uppercase">Cyber Jump</h4>
                    <p class="text-[10px] text-gray-500 italic">Win up to ₹500</p>
                </div>
                <div class="h-12 w-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500 font-bold">▶</div>
            </div>

            <div onclick="alert('Unlocking soon for VIP Players')" class="game-card glass p-4 rounded-[2rem] border-l-4 border-purple-500 flex items-center justify-between opacity-50">
                <div>
                    <span class="text-[8px] bg-purple-500/20 text-purple-400 px-2 py-1 rounded-full font-bold uppercase">Skill</span>
                    <h4 class="text-xl font-black mt-1 uppercase">Neon Blade</h4>
                    <p class="text-[10px] text-gray-500 italic">Global Leaderboard Only</p>
                </div>
                <div class="h-12 w-12 rounded-2xl bg-purple-500/10 flex items-center justify-center text-purple-500">🔒</div>
            </div>

            <div onclick="alert('Beta Testing: Starts at ₹100')" class="game-card glass p-4 rounded-[2rem] border-l-4 border-yellow-500 flex items-center justify-between opacity-50">
                <div>
                    <span class="text-[8px] bg-yellow-500/20 text-yellow-400 px-2 py-1 rounded-full font-bold uppercase">Pro</span>
                    <h4 class="text-xl font-black mt-1 uppercase">Crypto Dash</h4>
                    <p class="text-[10px] text-gray-500 italic">High Stakes Arena</p>
                </div>
                <div class="h-12 w-12 rounded-2xl bg-yellow-500/10 flex items-center justify-center text-yellow-500">🔒</div>
            </div>
        </div>

        <div class="mt-8 glass p-5 rounded-[2rem]">
            <div class="flex items-center justify-between mb-4">
                <span class="text-[9px] font-black uppercase text-gray-500">Recent Transactions</span>
                <span class="text-[9px] text-green-500 animate-pulse font-bold">● LIVE FEED</span>
            </div>
            <div id="liveFeed" class="text-[10px] space-y-3 opacity-60">
                </div>
        </div>
    </div>

    <div id="gameArena">
        <div class="flex justify-between items-center p-6">
            <h2 id="liveScore" class="text-2xl font-black text-blue-500">SCORE: 0</h2>
            <button onclick="location.reload()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-full text-[10px] font-black">QUIT ARENA</button>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        const feed = document.getElementById('liveFeed');
        const names = ["Rohan_Mumbai", "S.Sharma", "Gamer_Lucknow", "Amit_Delhi", "Kunal_Pro"];

        setInterval(() => {
            const name = names[Math.floor(Math.random() * names.length)];
            const entry = document.createElement('div');
            entry.innerHTML = `<span class="text-blue-500 italic font-bold">SUCCESS:</span> ${name} withdrew ₹120`;
            feed.prepend(entry);
            if(feed.childNodes.length > 3) feed.removeChild(feed.lastChild);
        }, 5000);

        function initGame(gameType) {
            document.getElementById('mainDashboard').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
            if(gameType === 'cyberJump') startCyberJump();
        }

        function startCyberJump() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 150;

            let player = { x: 50, y: canvas.height - 100, w: 40, h: 40, dy: 0, gravity: 0.5 };
            let obstacles = [];
            let frame = 0;
            let score = 0;

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Player
                player.dy += player.gravity;
                player.y += player.dy;
                if(player.y > canvas.height - 100) player.y = canvas.height - 100;
                
                ctx.fillStyle = '#3b82f6';
                ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.shadowBlur = 0;

                // Obstacles
                if(frame % 100 === 0) obstacles.push({ x: canvas.width, w: 40, h: 40 });
                obstacles.forEach((ob, i) => {
                    ob.x -= 6;
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(ob.x, canvas.height - 100, ob.w, ob.h);
                    if(player.x < ob.x + ob.w && player.x + player.w > ob.x && player.y + player.h > canvas.height - 100) {
                        alert("OUT! Final Score: " + score);
                        location.reload();
                    }
                    if(ob.x + ob.w < 0) { obstacles.splice(i, 1); score++; }
                });

                document.getElementById('liveScore').innerText = "SCORE: " + score;
                frame++;
                requestAnimationFrame(draw);
            }

            window.addEventListener('touchstart', (e) => {
                if(player.y >= canvas.height - 110) player.dy = -12;
            });
            draw();
        }
    </script>
</body>
</html>
