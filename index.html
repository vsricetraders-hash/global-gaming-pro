<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | India's Elite Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --accent: #3b82f6; --bg: #030303; --card: rgba(255,255,255,0.03); }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .page-content { display: none; padding-bottom: 120px; }
        .page-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #3b82f6 !important; }
        #gameArena, #policyOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; overflow-y: auto; }
        canvas { background: #050505; display: block; margin: 0 auto; border-radius: 24px; border: 1px solid #3b82f6; }
    </style>
</head>
<body>

    <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-4 flex justify-between items-center border-b border-white/5">
        <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter">NEXUS<span class="text-white font-normal">PRO</span></h1>
        <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/20 px-4 py-1.5 rounded-full flex items-center gap-2 active:scale-95 transition">
            <span class="text-xs font-black text-blue-400">₹0.00</span>
            <i class="fa-solid fa-circle-plus text-blue-500 text-xs"></i>
        </div>
    </nav>

    <main class="mt-24 px-5">

        <div id="home" class="page-content active">
            <div class="relative rounded-[2.5rem] h-44 overflow-hidden mb-8 border border-white/10 shadow-2xl">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-black p-6 flex flex-col justify-end">
                    <h2 class="text-2xl font-black italic">WIN ₹1,00,000</h2>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-none">Global Skill Competition</p>
                </div>
            </div>

            <div class="glass p-5 rounded-[2rem] mb-8">
                <h3 class="text-[10px] font-black text-blue-400 uppercase italic mb-4 tracking-widest">Live Leaders</h3>
                <div class="space-y-2 text-xs opacity-80 font-bold italic">
                    <div class="flex justify-between"><span>Sumit_UP</span><span class="text-green-400">₹450 Won</span></div>
                    <div class="flex justify-between"><span>Raja_Lucknow</span><span class="text-green-400">₹120 Won</span></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div onclick="showPage('games')" class="glass p-4 rounded-[2rem] text-center border-b-4 border-blue-500">
                    <div class="aspect-square bg-blue-500/10 rounded-3xl mb-3 flex items-center justify-center text-4xl text-blue-500"><i class="fa-solid fa-rocket"></i></div>
                    <p class="text-xs font-black uppercase italic">Cyber Jump</p>
                </div>
                <div class="glass p-4 rounded-[2rem] text-center opacity-40">
                    <div class="aspect-square bg-white/5 rounded-3xl mb-3 flex items-center justify-center text-3xl text-gray-600"><i class="fa-solid fa-lock"></i></div>
                    <p class="text-xs font-black uppercase italic">Ludo Pro</p>
                </div>
            </div>
        </div>

        <div id="games" class="page-content">
            <h2 class="text-2xl font-black mb-8 italic border-l-4 border-blue-500 pl-3">ARENA</h2>
            <div class="space-y-4">
                <div onclick="initGame()" class="glass p-6 rounded-[2.5rem] flex items-center justify-between border-l-4 border-blue-500 active:scale-95 transition">
                    <div><h4 class="text-lg font-black">CYBER JUMP</h4><p class="text-[10px] text-gray-500 font-bold uppercase">Practice Mode</p></div>
                    <div class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black italic">PLAY</div>
                </div>
                <div class="glass p-6 rounded-[2.5rem] flex items-center justify-between opacity-50">
                    <div><h4 class="text-lg font-black text-yellow-500 uppercase">Gold Pool</h4><p class="text-[10px] text-gray-400 font-bold uppercase italic">Entry ₹10 • Win ₹100</p></div>
                    <i class="fa-solid fa-lock text-yellow-500/30"></i>
                </div>
            </div>
        </div>

        <div id="wallet" class="page-content text-center">
            <div class="glass p-12 rounded-[3rem] mb-8 border-b-4 border-green-500">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest">Main Wallet</p>
                <h1 class="text-6xl font-black italic">₹0.00</h1>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="alert('Contact Support to Add Cash')" class="bg-blue-600 py-5 rounded-[1.5rem] font-black uppercase text-xs">Add Cash</button>
                <button class="glass py-5 rounded-[1.5rem] font-black uppercase text-xs">Withdraw</button>
            </div>
        </div>

        <div id="profile" class="page-content">
            <div class="flex items-center gap-5 mb-8">
                <div class="w-20 h-20 bg-blue-500 rounded-[2rem] flex items-center justify-center text-3xl font-black italic">H</div>
                <div><h2 class="text-2xl font-black italic">Harshit_Gamer</h2><p class="text-[10px] text-blue-500 font-bold uppercase">Pro Member</p></div>
            </div>
            
            <div class="space-y-3">
                <button onclick="openPolicy('Privacy Policy', 'Nexus Pro respect your privacy. We collect data for experience only.')" class="w-full glass p-5 rounded-2xl flex justify-between items-center text-xs font-bold italic"><span>Privacy Policy</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="openPolicy('Terms & Conditions', 'By using Nexus Pro, you agree to skill-based gaming laws.')" class="w-full glass p-5 rounded-2xl flex justify-between items-center text-xs font-bold italic"><span>Terms of Service</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="openPolicy('Fair Play', 'Our RNG system ensures 100% fair matches for all players.')" class="w-full glass p-5 rounded-2xl flex justify-between items-center text-xs font-bold italic"><span>Fair Play Policy</span><i class="fa-solid fa-chevron-right opacity-30"></i></button>
                <button onclick="window.location.href='https://wa.me/'" class="w-full glass p-5 rounded-2xl flex justify-between items-center text-xs font-bold italic text-green-400"><span>Help & Support</span><i class="fa-solid fa-headset"></i></button>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 inset-x-0 glass px-6 py-4 flex justify-between items-center z-[100] border-t border-white/5">
        <button onclick="showPage('home')" class="nav-btn flex flex-col items-center gap-1 nav-active"><i class="fa-solid fa-house-chimney"></i><span class="text-[7px] font-black uppercase">Home</span></button>
        <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-gamepad"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
        <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-wallet"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
        <button onclick="showPage('profile')" class="nav-btn flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-user-ninja"></i><span class="text-[7px] font-black uppercase">Profile</span></button>
    </footer>

    <div id="gameArena">
        <div class="p-6 mt-4 flex justify-between items-center"><h2 id="liveScore" class="text-3xl font-black text-blue-500 italic">0</h2><button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-full text-[10px] font-black uppercase border border-red-500/20">Exit</button></div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="policyOverlay" class="p-10">
        <h2 id="policyTitle" class="text-3xl font-black italic text-blue-500 mb-6 uppercase tracking-tight border-l-4 border-blue-500 pl-4"></h2>
        <div id="policyText" class="text-xs text-gray-400 leading-relaxed mb-10 font-bold italic"></div>
        <button onclick="closePolicy()" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 px-10 py-4 rounded-full font-black uppercase text-xs">Go Back</button>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-500'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('nav-active');
            event.currentTarget.classList.remove('text-gray-500');
        }

        function openPolicy(title, text) {
            document.getElementById('policyTitle').innerText = title;
            document.getElementById('policyText').innerText = text;
            document.getElementById('policyOverlay').style.display = 'block';
        }

        function closePolicy() { document.getElementById('policyOverlay').style.display = 'none'; }

        function initGame() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 40; canvas.height = 400;
            let p = {y:350, dy:0}, obs = [], score = 0, frame = 0;

            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                p.dy += 0.6; p.y += p.dy;
                if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6'; ctx.fillRect(50, p.y, 32, 32);
                ctx.shadowBlur = 0;
                if(frame % 90 === 0) obs.push({x:canvas.width, w:30});
                obs.forEach((o, i) => {
                    o.x -= 5; ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, 35);
                    if(50 < o.x + o.w - 5 && 82 > o.x + 5 && p.y > 320) { alert("Out! Score: " + score); location.reload(); }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                frame++; requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', (e) => { e.preventDefault(); if(p.y >= 340) p.dy = -12; });
            draw();
        }
    </script>
</body>
</html>
