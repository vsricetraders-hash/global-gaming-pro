<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Cloud Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #0f172a 40%, #020617 100%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page-content { display: none; height: 82vh; overflow-y: auto; padding-bottom: 180px; scrollbar-width: none; }
        .page-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99); z-index: 5000; padding: 25px; }
        canvas { background: #020617; border-radius: 35px; border: 1px solid #1e40af; width: 100%; max-width: 400px; margin: 0 auto; display: block; }
        .nexus-logo { font-family: 'Syncopate', sans-serif; letter-spacing: -2px; }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[6000] bg-[#020617] p-10 flex flex-col justify-center">
        <h1 class="text-3xl font-black italic text-blue-500 uppercase mb-4 nexus-logo">NexusPro</h1>
        <p class="text-[10px] text-gray-500 font-bold uppercase mb-12 tracking-widest italic">Cloud Sync Enabled</p>
        <div class="space-y-6">
            <input id="loginUser" type="text" placeholder="Gamer ID" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            <button onclick="handleLogin()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-500/30">Login to Cloud</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center border-b border-white/5">
            <h1 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter nexus-logo">NexusPro</h1>
            <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span id="topBal" class="text-xs font-black text-blue-400">₹0.00</span>
                <i class="fa-solid fa-sync-alt text-[8px] text-blue-500 animate-spin"></i>
            </div>
        </nav>

        <main class="mt-28 px-6">
            <div id="games" class="page-content active">
                <div class="glass p-6 rounded-[2.5rem] border-l-4 border-blue-500 mb-6">
                    <div class="flex justify-between items-start mb-6">
                        <div><h3 class="text-xl font-black italic uppercase">Cyber Battle</h3><p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest italic leading-none">1 Min Battle • Entry ₹10</p></div>
                        <i class="fa-solid fa-bolt text-xl text-blue-500"></i>
                    </div>
                    <button onclick="startMatchmaking(10)" class="w-full bg-blue-600 py-5 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-500/30">Find Opponent (₹10)</button>
                </div>
            </div>

            <div id="wallet" class="page-content text-center">
                <div class="glass p-12 rounded-[3.5rem] mb-8 border-b-4 border-blue-500 bg-gradient-to-br from-blue-900/10 to-transparent">
                    <p class="text-[10px] text-gray-500 font-black uppercase mb-2">Cloud Balance</p>
                    <h1 id="wallBal" class="text-6xl font-black italic tracking-tighter">₹0.00</h1>
                </div>
                <button onclick="window.location.href='https://wa.me/917309433678'" class="w-full bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs">Add Cash via WhatsApp</button>
            </div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 glass px-12 py-7 flex justify-between items-center z-[150] rounded-t-[3.5rem] border-t border-white/5">
            <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active transition"><i class="fa-solid fa-gamepad text-2xl"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
            <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition"><i class="fa-solid fa-wallet text-2xl"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
        </footer>
    </div>

    <div id="matchOverlay" class="overlay flex flex-col items-center justify-center">
        <div class="w-20 h-20 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 class="text-xl font-black italic uppercase animate-pulse">Finding Real Player...</h2>
    </div>

    <div id="gameArena" class="overlay">
        <div class="flex justify-between items-center mb-6 px-4">
            <div class="glass px-6 py-2 rounded-xl border-blue-500/40"><span id="timer" class="text-2xl font-black">01:00</span></div>
            <div class="glass px-6 py-2 rounded-xl border-blue-500/40"><span id="liveScore" class="text-2xl font-black text-blue-500">0</span></div>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        // TERA SUPABASE CONFIG
        const SB_URL = 'https://kqjgnbtrrvuqrnpquiut.supabase.co';
        const SB_KEY = 'sb_publishable_IDUG0HJGESoGB5grcECqcQ_zTrs4e83';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let activeUser = localStorage.getItem('nexus_user');

        async function handleLogin() {
            const user = document.getElementById('loginUser').value;
            if(!user) return alert("Username dalo!");
            
            // Check if user exists, else create
            const { data, error } = await supabase.from('profiles').select('*').eq('username', user).single();
            if(!data) {
                await supabase.from('profiles').insert([{ username: user, balance: 0 }]);
            }
            localStorage.setItem('nexus_user', user);
            location.reload();
        }

        window.onload = () => {
            if(activeUser) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                syncBalance();
                // Auto sync every 10 seconds
                setInterval(syncBalance, 10000);
            }
        }

        async function syncBalance() {
            const { data } = await supabase.from('profiles').select('balance').eq('username', activeUser).single();
            if(data) {
                const b = parseFloat(data.balance).toFixed(2);
                document.getElementById('topBal').innerText = "₹" + b;
                document.getElementById('wallBal').innerText = "₹" + b;
                return parseFloat(b);
            }
        }

        async function startMatchmaking(fee) {
            const currentBal = await syncBalance();
            if(currentBal < fee) return alert("Balance kam hai bhai!");

            // Deduct Fee in Cloud
            await supabase.from('profiles').update({ balance: currentBal - fee }).eq('username', activeUser);
            
            document.getElementById('matchOverlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('matchOverlay').style.display = 'none';
                initGame(fee);
            }, 4000);
        }

        function initGame(fee) {
            document.getElementById('gameArena').style.display = 'block';
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 350; canvas.height = 400;

            let p = {y:350, dy:0}, obs = [], score = 0, botScore = 0, timeLeft = 60;

            const timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if(Math.random() > 0.7) botScore++; // Bot scoring simulation

                if(timeLeft <= 0) {
                    clearInterval(timerInt);
                    finishBattle(score, botScore, fee);
                }
            }, 1000);

            function draw() {
                if(timeLeft <= 0) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                p.dy += 0.8; p.y += p.dy; if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(50, p.y, 35, 35);
                
                if(Math.random() < 0.02) obs.push({x:canvas.width, w:30});
                obs.forEach((o, i) => {
                    o.x -= 6; ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, 40);
                    if(50 < o.x + o.w && 85 > o.x && p.y > 310) { score = Math.max(0, score - 1); }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', () => { if(p.y >= 340) p.dy = -14; });
            draw();
        }

        async function finishBattle(myScore, oppScore, fee) {
            if(myScore > oppScore) {
                const winAmt = fee * 1.8;
                alert(`JEET GAYE! You won ₹${winAmt}`);
                const { data } = await supabase.from('profiles').select('balance').eq('username', activeUser).single();
                await supabase.from('profiles').update({ balance: parseFloat(data.balance) + winAmt }).eq('username', activeUser);
            } else {
                alert(`HAAR GAYE! Bot score: ${oppScore}. Try Again!`);
            }
            location.reload();
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
