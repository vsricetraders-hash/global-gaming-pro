<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Supreme Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #0f172a 40%, #020617 100%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        body::before { content: ""; position: fixed; inset: 0; background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page-content { display: none; height: 82vh; overflow-y: auto; padding-bottom: 180px; scrollbar-width: none; }
        .page-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .auth-step { display: none; }
        .auth-step.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nexus-logo { font-family: 'Syncopate', sans-serif; letter-spacing: -2px; }
        .nav-active { color: #3b82f6 !important; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99); z-index: 2000; padding: 25px; overflow-y: auto; }
        canvas { background: #020617; border-radius: 35px; border: 1px solid #1e40af; }
    </style>
</head>
<body>

    <div id="authOverlay" class="fixed inset-0 z-[5000] bg-[#020617] p-10 flex flex-col justify-center">
        <h1 class="text-3xl font-black italic text-blue-500 uppercase mb-4 nexus-logo">NexusPro</h1>
        
        <div id="stepMobile" class="auth-step active">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-8 italic">Step 1: Mobile Login</p>
            <div class="space-y-6">
                <div class="relative">
                    <span class="absolute left-5 top-5 text-gray-500 font-black">+91</span>
                    <input id="loginPhone" type="number" placeholder="Enter Mobile Number" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 pl-16 text-sm font-black italic outline-none focus:border-blue-500">
                </div>
                <button onclick="goToStep('stepOTP')" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-500/30">Get OTP</button>
            </div>
        </div>

        <div id="stepOTP" class="auth-step">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-8 italic">Step 2: Enter OTP</p>
            <div class="space-y-6">
                <input id="loginOTP" type="number" placeholder="Enter 4 Digit OTP" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-center text-xl font-black tracking-[1em] outline-none focus:border-blue-500">
                <p class="text-[8px] text-blue-400 font-bold uppercase text-center cursor-pointer">Resend OTP in 30s</p>
                <button onclick="verifyOTP()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-500/30">Verify OTP</button>
            </div>
        </div>

        <div id="stepUser" class="auth-step">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-8 italic">Step 3: Unique Username</p>
            <div class="space-y-6">
                <input id="loginUser" type="text" placeholder="Create Unique Gamer ID" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
                <div id="userStatus" class="text-[8px] font-bold uppercase italic mt-2"></div>
                <button onclick="finalizeLogin()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs shadow-xl shadow-blue-500/40">Complete Registration</button>
            </div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center border-b border-white/5">
            <h1 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter nexus-logo">NexusPro</h1>
            <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span id="topBal" class="text-xs font-black text-blue-400">₹0.00</span>
                <div class="bg-blue-600 rounded-full w-4 h-4 flex items-center justify-center"><i class="fa-solid fa-plus text-[8px]"></i></div>
            </div>
        </nav>

        <main class="mt-32 px-6">
            <div id="games" class="page-content active">
                <div class="battle-card p-6 rounded-[2.5rem] border-l-4 border-blue-500">
                    <div class="flex justify-between items-start mb-6">
                        <div><h3 class="text-xl font-black italic uppercase">Cyber Jump</h3><p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">₹10 Battle</p></div>
                        <i class="fa-solid fa-bolt-lightning text-xl text-blue-500"></i>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="initGame()" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase">Practice</button>
                        <button onclick="checkEntry(10)" class="flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase">₹10 Play</button>
                    </div>
                </div>
            </div>

            <div id="wallet" class="page-content">
                <div class="glass p-12 rounded-[3.5rem] text-center mb-8 border-b-4 border-blue-500 bg-gradient-to-br from-blue-900/10 to-transparent">
                    <p class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest italic">Net Wallet</p>
                    <h1 id="wallBal" class="text-6xl font-black italic tracking-tighter">₹0.00</h1>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="openOverlay('depositOverlay')" class="bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs shadow-2xl">Add Cash</button>
                    <button onclick="openOverlay('withdrawOverlay')" class="glass py-6 rounded-[2rem] font-black uppercase text-xs">Withdraw</button>
                </div>
            </div>

            <div id="vip" class="page-content">
                <div class="battle-card p-8 rounded-[3rem] border-l-4 border-yellow-500" onclick="handleAdminClick()">
                    <h2 id="userDisplay" class="text-2xl font-black italic uppercase mb-2">Gamer</h2>
                    <p class="text-[10px] text-yellow-500 font-black uppercase italic">Elite Tier Member</p>
                </div>
                <button onclick="logout()" class="w-full glass py-5 mt-6 rounded-2xl text-[10px] font-black uppercase text-red-500">Logout Account</button>
            </div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 glass px-12 py-7 flex justify-between items-center z-[150] rounded-t-[3.5rem] border-t border-white/5">
            <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active transition"><i class="fa-solid fa-gamepad text-2xl"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
            <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition"><i class="fa-solid fa-wallet text-2xl"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
            <button onclick="showPage('vip')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition"><i class="fa-solid fa-crown text-2xl"></i><span class="text-[7px] font-black uppercase">VIP</span></button>
        </footer>
    </div>

    <div id="depositOverlay" class="overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-2xl font-black italic text-blue-500 uppercase">Deposit</h2><button onclick="closeOverlay('depositOverlay')"><i class="fa-solid fa-xmark text-2xl opacity-30"></i></button></div>
        <div class="glass p-8 rounded-[3rem] border-dashed border-blue-500/50 text-center mb-10">
            <p class="text-xl font-black italic text-white mb-6">9336258808@ptaxis</p>
            <button onclick="alert('UPI ID Copied!')" class="bg-blue-600 px-10 py-4 rounded-full text-[10px] font-black uppercase shadow-xl shadow-blue-500/30">Copy UPI ID</button>
        </div>
        <p class="text-center text-[10px] text-gray-500 italic uppercase">WhatsApp Screenshot: 7309433678</p>
    </div>

    <div id="adminOverlay" class="overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-2xl font-black italic text-red-500 uppercase">Admin Console</h2><button onclick="closeOverlay('adminOverlay')"><i class="fa-solid fa-xmark text-2xl opacity-30"></i></button></div>
        <div class="space-y-6">
            <input id="adminUser" type="text" placeholder="Gamer ID" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none">
            <input id="adminAmt" type="number" placeholder="New Balance" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none">
            <button onclick="setBalance()" class="w-full bg-red-600 py-6 rounded-3xl font-black uppercase text-xs">Update Balance</button>
        </div>
    </div>

    <div id="gameArena" class="overlay">
        <div class="p-8 flex justify-between items-center mt-6">
            <div class="glass px-8 py-3 rounded-2xl border-blue-500/40"><span id="liveScore" class="text-4xl font-black text-blue-500 italic">0</span></div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-8 py-3 rounded-2xl text-[10px] font-black uppercase border border-red-500/20 active:scale-95 transition">Quit Arena</button>
        </div>
        <canvas id="mainCanvas" class="mt-8"></canvas>
    </div>

    <script>
        let adminClicks = 0;

        // --- AUTH LOGIC (ZUPEE STYLE) ---
        function goToStep(stepId) {
            const phone = document.getElementById('loginPhone').value;
            if(!phone || phone.length < 10) return alert("Bhai, 10 Digit Number dalo!");
            document.querySelectorAll('.auth-step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function verifyOTP() {
            const otp = document.getElementById('loginOTP').value;
            if(otp.length === 4) {
                goToStep('stepUser');
            } else {
                alert("Bhai, 4 Digit OTP dalo! (Tip: Kuch bhi 4 digit dalo abhi test ke liye)");
            }
        }

        function finalizeLogin() {
            const user = document.getElementById('loginUser').value;
            if(!user) return alert("Bhai, Unique Naam dalo!");
            
            // Check if username already exists in our "Ludo Database" (LocalStorage)
            if(localStorage.getItem(user + '_taken')) {
                document.getElementById('userStatus').innerText = "USERNAME TAKEN! TRY ANOTHER.";
                document.getElementById('userStatus').className = "text-[8px] font-bold uppercase italic mt-2 text-red-500";
                return;
            }

            // Save Registration
            localStorage.setItem('active_user', user);
            localStorage.setItem(user + '_taken', 'true');
            if(!localStorage.getItem(user + '_bal')) localStorage.setItem(user + '_bal', '0.00');
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('active_user');
            if(user) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userDisplay').innerText = user;
                updateUI();
            }
        }

        function updateUI() {
            const user = localStorage.getItem('active_user');
            const bal = localStorage.getItem(user + '_bal') || '0.00';
            const b = parseFloat(bal).toFixed(2);
            document.getElementById('topBal').innerText = "₹" + b;
            document.getElementById('wallBal').innerText = "₹" + b;
        }

        function checkEntry(fee) {
            const user = localStorage.getItem('active_user');
            const currentBal = parseFloat(localStorage.getItem(user + '_bal') || '0.00');
            if(currentBal >= fee) {
                const newBal = (currentBal - fee).toFixed(2);
                localStorage.setItem(user + '_bal', newBal);
                updateUI();
                initGame();
            } else {
                openOverlay('depositOverlay');
            }
        }

        function handleAdminClick() {
            adminClicks++; if(adminClicks >= 5) { openOverlay('adminOverlay'); adminClicks = 0; }
        }

        function setBalance() {
            const target = document.getElementById('adminUser').value;
            const amt = document.getElementById('adminAmt').value;
            if(!target || !amt) return alert("Details bharo!");
            localStorage.setItem(target + '_bal', amt);
            alert("Balance Updated for " + target); updateUI(); closeOverlay('adminOverlay');
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('nav-active'); event.currentTarget.classList.remove('text-gray-500');
        }

        function openOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.removeItem('active_user'); location.reload(); }

        // --- GAME ENGINE ---
        function initGame() {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 60; canvas.height = 420;
            let p = {y:350, dy:0}, obs = [], score = 0, frame = 0, speed = 5;
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                if(score > 5) speed = 7.5; if(score > 15) speed = 10;
                p.dy += 0.75; p.y += p.dy;
                if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
                ctx.fillRect(60, p.y, 35, 35); ctx.shadowBlur = 0;
                if(frame % 90 === 0) obs.push({x:canvas.width, w:30, h:45});
                obs.forEach((o, i) => {
                    o.x -= speed; ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, o.h);
                    if(60 < o.x + o.w - 5 && 95 > o.x + 5 && p.y > 310) { alert("Session Over! Score: " + score); location.reload(); }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                frame++; requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', (e) => { e.preventDefault(); if(p.y >= 335) p.dy = -13.5; }, {passive:false});
            draw();
        }
    </script>
</body>
</html>
