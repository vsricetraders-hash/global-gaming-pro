<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | The Supreme Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #0f172a 40%, #020617 100%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page-content { display: none; height: 82vh; overflow-y: auto; padding-bottom: 200px; scrollbar-width: none; }
        .page-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .battle-card { background: linear-gradient(145deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%); border: 1px solid rgba(255, 255, 255, 0.1); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99); z-index: 5000; padding: 25px; overflow-y: auto; }
        canvas { background: #020617; border-radius: 35px; border: 1px solid #1e40af; width: 100%; max-width: 400px; display: block; margin: 0 auto; }
        .nexus-logo { font-family: 'Syncopate', sans-serif; letter-spacing: -2px; }
        .loader-ring { width: 80px; height: 80px; border: 5px solid #1e3a8a; border-top: 5px solid #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[6000] bg-[#020617] p-10 flex flex-col justify-center">
        <h1 class="text-4xl font-black italic text-blue-500 uppercase mb-4 nexus-logo">NexusPro</h1>
        <div class="space-y-6">
            <input id="userName" type="text" placeholder="Gamer ID" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            <button onclick="loginUser()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs shadow-xl active:scale-95 transition">Enter Arena</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center border-b border-white/5">
            <h1 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter nexus-logo">NexusPro</h1>
            <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span id="topBal" class="text-xs font-black text-blue-400">₹0.00</span>
                <i class="fa-solid fa-plus-circle text-blue-500 text-[10px]"></i>
            </div>
        </nav>

        <main class="mt-28 px-6">
            <div id="games" class="page-content active">
                <div class="battle-card p-6 rounded-[2.5rem] border-l-4 border-blue-500 text-center">
                    <h3 class="text-2xl font-black italic uppercase mb-2">Cyber Jump</h3>
                    <p class="text-[10px] text-blue-400 font-bold uppercase mb-6 italic">1 Min Battle • Entry ₹10</p>
                    <div class="flex gap-3">
                        <button onclick="initGame(0)" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black">Practice</button>
                        <button onclick="startMatch(10)" class="flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-500/40">₹10 Play</button>
                    </div>
                </div>
            </div>

            <div id="wallet" class="page-content text-center">
                <div class="glass p-12 rounded-[3.5rem] mb-8 border-b-4 border-blue-500 bg-gradient-to-br from-blue-900/10 to-transparent">
                    <p class="text-[10px] text-gray-500 font-black uppercase mb-2">My Balance</p>
                    <h1 id="wallBal" class="text-6xl font-black italic tracking-tighter">₹0.00</h1>
                </div>
                <div class="space-y-4">
                    <button onclick="openOverlay('depositOverlay')" class="w-full bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs">Add Cash</button>
                    <div class="glass p-5 rounded-2xl flex gap-3">
                        <input id="promoCode" type="text" placeholder="Enter Redeem Code" class="flex-1 bg-white/5 border-none outline-none text-xs font-bold uppercase italic">
                        <button onclick="redeemCode()" class="bg-blue-500 px-6 py-2 rounded-xl text-[10px] font-black">REDEEM</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 glass px-12 py-7 flex justify-between items-center z-[150] rounded-t-[3.5rem] border-t border-white/5">
            <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active transition"><i class="fa-solid fa-gamepad text-2xl"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
            <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition"><i class="fa-solid fa-wallet text-2xl"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
        </footer>
    </div>

    <div id="matchOverlay" class="overlay flex flex-col items-center justify-center">
        <div class="loader-ring mb-8"></div>
        <h2 class="text-2xl font-black italic uppercase animate-pulse">Finding Opponent...</h2>
    </div>

    <div id="gameArena" class="overlay">
        <div class="flex justify-between items-center mb-6 px-4">
            <div class="glass px-6 py-2 rounded-xl border-blue-500/40"><span id="timer" class="text-2xl font-black">01:00</span></div>
            <div class="glass px-6 py-2 rounded-xl border-blue-500/40"><span id="liveScore" class="text-2xl font-black text-blue-500">0</span></div>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="depositOverlay" class="overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-2xl font-black italic text-blue-500 uppercase">Deposit</h2><button onclick="closeOverlay('depositOverlay')"><i class="fa-solid fa-xmark text-2xl"></i></button></div>
        <div class="glass p-8 rounded-[3rem] border-dashed border-blue-500/50 text-center mb-10">
            <p class="text-xl font-black italic text-white mb-6">9336258808@ptaxis</p>
            <button onclick="window.location.href='https://wa.me/917309433678'" class="w-full bg-green-600 py-4 rounded-full text-[10px] font-black uppercase mb-4">WhatsApp Screenshot</button>
            <button onclick="window.location.href='https://t.me/Iamvaibhav90'" class="w-full glass py-4 rounded-full text-[10px] font-black uppercase">Telegram Support</button>
        </div>
    </div>

    <script>
        // NO SUPABASE - PURE LOCAL LOGIC
        function loginUser() {
            const user = document.getElementById('userName').value;
            if(!user) return alert("Enter ID!");
            localStorage.setItem('active_user', user);
            if(!localStorage.getItem(user + '_bal')) localStorage.setItem(user + '_bal', '0.00');
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('active_user');
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                updateUI();
            }
        }

        function updateUI() {
            const user = localStorage.getItem('active_user');
            const bal = parseFloat(localStorage.getItem(user + '_bal') || '0.00').toFixed(2);
            document.getElementById('topBal').innerText = "₹" + bal;
            document.getElementById('wallBal').innerText = "₹" + bal;
        }

        // REDEEM SYSTEM (TERA POWER)
        function redeemCode() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            const user = localStorage.getItem('active_user');
            const currentBal = parseFloat(localStorage.getItem(user + '_bal'));
            
            // Example: ADD100 gives 100 rupees
            if(code.startsWith('ADD')) {
                const amount = parseInt(code.replace('ADD', ''));
                if(!isNaN(amount)) {
                    localStorage.setItem(user + '_bal', (currentBal + amount).toFixed(2));
                    alert(`₹${amount} Added Successfully!`);
                    updateUI();
                    document.getElementById('promoCode').value = '';
                    return;
                }
            }
            alert("Invalid Code!");
        }

        function startMatch(fee) {
            const user = localStorage.getItem('active_user');
            const bal = parseFloat(localStorage.getItem(user + '_bal'));
            if(bal < fee) return openOverlay('depositOverlay');
            
            localStorage.setItem(user + '_bal', (bal - fee).toFixed(2));
            updateUI();
            
            document.getElementById('matchOverlay').style.display = 'flex';
            // FAST MATCHMAKING - NO DATABASE HANG
            setTimeout(() => {
                document.getElementById('matchOverlay').style.display = 'none';
                initGame(fee);
            }, 2500);
        }

        function initGame(fee) {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 60; canvas.height = 400;
            
            let p = {y:350, dy:0}, obs = [], score = 0, botScore = 0, timeLeft = 60;
            const timerInt = setInterval(() => {
                if(fee > 0) {
                    timeLeft--;
                    document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                    if(Math.random() > 0.7) botScore++;
                    if(timeLeft <= 0) { clearInterval(timerInt); finishGame(score, botScore, fee); }
                }
            }, 1000);

            function draw() {
                if(timeLeft <= 0 && fee > 0) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                p.dy += 0.8; p.y += p.dy; if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(60, p.y, 35, 35);
                if(Math.random() < 0.02) obs.push({x:canvas.width, w:30, h:45});
                obs.forEach((o, i) => {
                    o.x -= 6; ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, o.h);
                    if(60 < o.x + o.w - 5 && 95 > o.x + 5 && p.y > 310) { score = Math.max(0, score - 2); }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', (e) => { e.preventDefault(); if(p.y >= 335) p.dy = -13.5; }, {passive:false});
            draw();
        }

        function finishGame(myScore, oppScore, fee) {
            const user = localStorage.getItem('active_user');
            const bal = parseFloat(localStorage.getItem(user + '_bal'));
            if(myScore > oppScore) {
                const prize = fee * 1.8;
                alert(`VICTORY! Score: ${myScore} vs ${oppScore}. Won ₹${prize}`);
                localStorage.setItem(user + '_bal', (bal + prize).toFixed(2));
            } else {
                alert(`LOST! Score: ${myScore} vs ${oppScore}`);
            }
            location.reload();
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-500'));
            document.getElementById(id).classList.add('active');
        }
        function openOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
