<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Payout Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        body { background: radial-gradient(circle at 0% 0%, #0a1128 0%, #000 50%, #000b1a 100%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        body::before { content: ""; position: fixed; inset: 0; background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .battle-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.4), rgba(15, 23, 42, 0.6)); border: 1px solid rgba(59, 130, 246, 0.2); transition: all 0.3s ease; }
        .page-content { display: none; padding-bottom: 130px; height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .page-content.active { display: block; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #3b82f6 !important; text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        #gameArena, #withdrawOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 24px; }
        #gameArena { background: #000; }
        canvas { background: #050505; display: block; margin: 0 auto; border-radius: 30px; border: 1px solid #3b82f6; }
    </style>
</head>
<body>

    <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xl font-black italic text-blue-500 tracking-tighter uppercase" style="font-family:'Syncopate'">Nexus<span class="text-white">Pro</span></h1>
        <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-2 active:scale-90 transition">
            <span class="text-[10px] font-black text-blue-400 tracking-tighter">₹0.00</span>
            <div class="bg-blue-600 rounded-full w-4 h-4 flex items-center justify-center"><i class="fa-solid fa-plus text-[8px]"></i></div>
        </div>
    </nav>

    <main class="mt-24 px-6">
        <div id="games" class="page-content active">
            <h2 class="text-[9px] font-black text-blue-500/50 mb-6 tracking-[0.5em] uppercase italic">Elite Arena</h2>
            <div class="battle-card p-6 rounded-[2.5rem] border-l-4 border-blue-500 mb-6">
                <div class="flex justify-between items-start mb-6 text-2xl font-black italic uppercase tracking-tighter">
                    <div><h3>Cyber Jump</h3><p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest leading-none">Global Skill</p></div>
                    <i class="fa-solid fa-bolt-lightning text-blue-500"></i>
                </div>
                <div class="flex gap-4">
                    <button onclick="initGame()" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase">Practice</button>
                    <button class="flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-500/30">₹10 Battle</button>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="battle-card p-5 rounded-[2rem] opacity-40 flex flex-col items-center"><i class="fa-solid fa-crosshairs text-2xl mb-2 text-gray-500"></i><span class="text-[8px] font-black uppercase">Reflex Strike</span></div>
                <div class="battle-card p-5 rounded-[2rem] opacity-40 flex flex-col items-center"><i class="fa-solid fa-gauge-high text-2xl mb-2 text-gray-500"></i><span class="text-[8px] font-black uppercase">Turbo Drift</span></div>
            </div>
        </div>

        <div id="wallet" class="page-content">
            <div class="glass p-12 rounded-[3.5rem] text-center mb-8 border-b-4 border-blue-500 bg-gradient-to-br from-blue-900/20 to-transparent">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-[0.3em]">Net Winnings</p>
                <h1 class="text-6xl font-black italic tracking-tighter mb-2">₹0.00</h1>
                <p class="text-[8px] text-green-500 font-bold uppercase">Ready for Settlement</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="alert('Redirecting to UPI Gateway...')" class="bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs shadow-2xl shadow-blue-500/20">Add Cash</button>
                <button onclick="openWithdraw()" class="glass py-6 rounded-[2rem] font-black uppercase text-xs">Withdraw</button>
            </div>
        </div>

        <div id="vip" class="page-content">
            <div class="battle-card p-8 rounded-[3.5rem] border-l-4 border-yellow-500">
                <div class="flex items-center gap-5 mb-6">
                    <div class="w-16 h-16 bg-yellow-500 rounded-3xl flex items-center justify-center text-3xl text-black shadow-xl shadow-yellow-500/20"><i class="fa-solid fa-crown"></i></div>
                    <div><h2 class="text-xl font-black italic tracking-tighter uppercase">Elite Member</h2><p class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Level 1 • Bronze</p></div>
                </div>
                <div class="bg-white/5 h-2 rounded-full mb-3"><div class="bg-yellow-500 h-full rounded-full w-[10%] shadow-lg"></div></div>
                <p class="text-[8px] text-gray-500 font-bold uppercase text-right">₹900 more to Silver</p>
            </div>
        </div>
    </main>

    <div id="withdrawOverlay">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black italic text-blue-500 uppercase">Payout Portal</h2>
            <button onclick="closeWithdraw()" class="text-gray-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-widest block mb-3">Withdrawal Method</label>
                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-blue-600/20 border border-blue-500 rounded-2xl py-4 flex flex-col items-center gap-2">
                        <i class="fa-solid fa-mobile-screen-button"></i><span class="text-[10px] font-black uppercase italic">UPI</span>
                    </button>
                    <button class="glass rounded-2xl py-4 flex flex-col items-center gap-2 opacity-50">
                        <i class="fa-solid fa-building-columns"></i><span class="text-[10px] font-black uppercase italic">Bank</span>
                    </button>
                </div>
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-widest block mb-3">Enter UPI ID</label>
                <input type="text" placeholder="example@upi" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-black uppercase tracking-widest block mb-3">Amount to Withdraw</label>
                <input type="number" placeholder="Min. ₹100" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            </div>

            <div class="pt-6">
                <button onclick="alert('Withdrawal Request Submitted!')" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase tracking-widest text-sm shadow-2xl shadow-blue-500/30">Verify & Settle</button>
                <p class="text-center mt-6 text-[8px] text-gray-600 font-bold uppercase italic">Withdrawals are processed within 2-4 hours</p>
            </div>
        </div>
    </div>

    <footer class="fixed bottom-0 inset-x-0 glass px-12 py-6 flex justify-between items-center z-[100] rounded-t-[3rem] border-t border-white/5">
        <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active transition">
            <i class="fa-solid fa-gamepad text-xl"></i><span class="text-[7px] font-black uppercase tracking-widest">Arena</span>
        </button>
        <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition">
            <i class="fa-solid fa-wallet text-xl"></i><span class="text-[7px] font-black uppercase tracking-widest">Wallet</span>
        </button>
        <button onclick="showPage('vip')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition">
            <i class="fa-solid fa-crown text-xl"></i><span class="text-[7px] font-black uppercase tracking-widest">VIP</span>
        </button>
    </footer>

    <div id="gameArena">
        <div class="p-8 flex justify-between items-center mt-4">
            <div class="glass px-6 py-2 rounded-2xl border-blue-500/40"><span id="liveScore" class="text-4xl font-black text-blue-500 italic">0</span></div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-red-500/20 active:scale-95">Quit</button>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('nav-active'); event.currentTarget.classList.remove('text-gray-500');
        }

        function openWithdraw() { document.getElementById('withdrawOverlay').style.display = 'block'; }
        function closeWithdraw() { document.getElementById('withdrawOverlay').style.display = 'none'; }

        function initGame() {
            document.getElementById('gameArena').style.display = 'block';
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 60; canvas.height = 400;

            let p = {y:350, dy:0}, obs = [], score = 0, frame = 0;
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                p.dy += 0.7; p.y += p.dy;
                if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
                ctx.fillRect(50, p.y, 35, 35); ctx.shadowBlur = 0;
                if(frame % 90 === 0) obs.push({x:canvas.width, w:30, h:45});
                obs.forEach((o, i) => {
                    o.x -= 5; ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, o.h);
                    if(50 < o.x + o.w - 5 && 85 > o.x + 5 && p.y > 310) { alert("Session End! Score: " + score); location.reload(); }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                frame++; requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', (e) => { e.preventDefault(); if(p.y >= 340) p.dy = -13; });
            draw();
        }
    </script>
</body>
</html>
