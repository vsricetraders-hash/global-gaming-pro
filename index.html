<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Instant Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #0f172a 40%, #020617 100%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page-content { display: none; height: 82vh; overflow-y: auto; padding-bottom: 200px; scrollbar-width: none; }
        .page-content.active { display: block; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99); z-index: 5000; padding: 25px; overflow-y: auto; }
        #gameArena { z-index: 9999 !important; }
        canvas { background: #020617; border-radius: 35px; border: 2px solid #3b82f6; width: 100%; max-width: 400px; display: block; margin: 0 auto; }
        .nexus-logo { font-family: 'Syncopate', sans-serif; letter-spacing: -2px; }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[10000] bg-[#020617] p-10 flex flex-col justify-center">
        <h1 class="text-4xl font-black italic text-blue-500 uppercase mb-8 nexus-logo">NexusPro</h1>
        <div class="space-y-6">
            <input id="userName" type="text" placeholder="Gamer ID" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            <button onclick="loginUser()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs">Enter Arena</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center border-b border-white/5">
            <h1 class="text-xl font-black italic text-blue-500 uppercase nexus-logo">NexusPro</h1>
            <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span id="topBal" class="text-xs font-black text-blue-400">₹0.00</span>
                <i class="fa-solid fa-plus-circle text-blue-500 text-[10px]"></i>
            </div>
        </nav>

        <main class="mt-28 px-6">
            <div id="games" class="page-content active">
                <div class="glass p-8 rounded-[3rem] border-l-4 border-blue-600 text-center">
                    <h3 class="text-2xl font-black italic uppercase mb-2">Cyber Battle</h3>
                    <p class="text-[10px] text-blue-400 font-bold uppercase mb-8 italic">1 Min Match • Entry ₹10</p>
                    <button onclick="startMatch(10)" class="w-full bg-blue-600 py-5 rounded-2xl text-[10px] font-black uppercase shadow-lg shadow-blue-500/40">₹10 PLAY NOW</button>
                </div>
            </div>

            <div id="wallet" class="page-content text-center">
                <div class="glass p-12 rounded-[3.5rem] mb-8 border-b-4 border-blue-500">
                    <p class="text-[10px] text-gray-500 font-black mb-2 uppercase">Net Wallet</p>
                    <h1 id="wallBal" class="text-6xl font-black italic tracking-tighter">₹0.00</h1>
                </div>
                <div class="space-y-4">
                    <button onclick="openOverlay('depositOverlay')" class="w-full bg-blue-600 py-6 rounded-2xl font-black uppercase text-xs">Add Cash</button>
                    <div class="glass p-5 rounded-2xl flex gap-3">
                        <input id="promoCode" type="text" placeholder="Promo Code" class="flex-1 bg-transparent outline-none text-xs font-bold uppercase italic">
                        <button onclick="redeem()" class="bg-blue-500 px-6 py-2 rounded-xl text-[10px] font-black">REDEEM</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 glass px-12 py-7 flex justify-between items-center z-[150] border-t border-white/5 rounded-t-[3.5rem]">
            <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 active"><i class="fa-solid fa-gamepad text-2xl"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
            <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-wallet text-2xl"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
        </footer>
    </div>

    <div id="gameArena" class="overlay">
        <div class="flex justify-between items-center mb-6 px-4 mt-4">
            <div class="glass px-6 py-2 rounded-xl"><span id="timer" class="text-2xl font-black">01:00</span></div>
            <div class="glass px-6 py-2 rounded-xl"><span id="liveScore" class="text-2xl font-black text-blue-500">0</span></div>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="depositOverlay" class="overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-2xl font-black text-blue-500 uppercase">Deposit</h2><button onclick="closeOverlay('depositOverlay')"><i class="fa-solid fa-x"></i></button></div>
        <div class="glass p-8 rounded-[3rem] text-center border-dashed border-blue-500/50">
            <p class="text-xl font-black italic mb-6">9336258808@ptaxis</p>
            <button onclick="window.location.href='https://wa.me/917309433678'" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase text-xs">WhatsApp Screenshot</button>
        </div>
    </div>

    <script>
        function loginUser() {
            const user = document.getElementById('userName').value;
            if(!user) return alert("Enter ID!");
            localStorage.setItem('nexus_active', user);
            if(!localStorage.getItem(user + '_bal')) localStorage.setItem(user + '_bal', '0.00');
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('nexus_active');
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                updateUI();
            }
        }

        function updateUI() {
            const user = localStorage.getItem('nexus_active');
            const bal = parseFloat(localStorage.getItem(user + '_bal') || '0.00').toFixed(2);
            document.getElementById('topBal').innerText = "₹" + bal;
            document.getElementById('wallBal').innerText = "₹" + bal;
        }

        function redeem() {
            const code = document.getElementById('promoCode').value.toUpperCase();
            const user = localStorage.getItem('nexus_active');
            const current = parseFloat(localStorage.getItem(user + '_bal'));
            if(code.startsWith('ADD')) {
                const amt = parseInt(code.replace('ADD', ''));
                if(!isNaN(amt)) {
                    localStorage.setItem(user + '_bal', (current + amt).toFixed(2));
                    alert(`₹${amt} Added!`); updateUI();
                    document.getElementById('promoCode').value = '';
                    return;
                }
            }
            alert("Invalid Code!");
        }

        // --- DIRECT MATCH START (NO LOADING BAKCHODI) ---
        function startMatch(fee) {
            const user = localStorage.getItem('nexus_active');
            const bal = parseFloat(localStorage.getItem(user + '_bal'));
            
            if(bal < fee) {
                return openOverlay('depositOverlay');
            }
            
            // Deduct Fee instantly
            localStorage.setItem(user + '_bal', (bal - fee).toFixed(2));
            updateUI();
            
            // DIRECT START GAME. NO DELAY.
            initArena(fee);
        }

        function initArena(fee) {
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
            
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 60; 
            canvas.height = 420;
            
            let p = {y:350, dy:0}, obs = [], score = 0, botScore = 0, timeLeft = 60;
            
            const tInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if(Math.random() > 0.7) botScore++;
                if(timeLeft <= 0) { 
                    clearInterval(tInt); 
                    finish(score, botScore, fee); 
                }
            }, 1000);

            function draw() {
                if(timeLeft <= 0) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                
                // Player Gravity
                p.dy += 0.8; 
                p.y += p.dy; 
                if(p.y > 350) p.y = 350;
                
                // Draw Player
                ctx.fillStyle = '#3b82f6'; 
                ctx.fillRect(60, p.y, 35, 35);
                
                // Obstacles
                if(Math.random() < 0.02) obs.push({x:canvas.width, w:30, h:45});
                
                obs.forEach((o, i) => {
                    o.x -= 7; 
                    ctx.fillStyle = '#ff4444'; 
                    ctx.fillRect(o.x, 350, o.w, o.h);
                    
                    // Collision
                    if(60 < o.x + o.w - 5 && 95 > o.x + 5 && p.y > 310) { 
                        score = Math.max(0, score - 2); 
                    }
                    if(o.x + o.w < 0) { 
                        obs.splice(i, 1); 
                        score++; 
                    }
                });
                
                document.getElementById('liveScore').innerText = score;
                requestAnimationFrame(draw);
            }
            
            // Controls
            window.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if(p.y >= 335) p.dy = -13.5; 
            }, {passive:false});
            
            draw();
        }

        function finish(s, bs, f) {
            const user = localStorage.getItem('nexus_active');
            const bal = parseFloat(localStorage.getItem(user + '_bal'));
            if(s > bs) {
                const win = f * 1.8;
                alert(`WINNER! Won ₹${win}`);
                localStorage.setItem(user + '_bal', (bal + win).toFixed(2));
            } else { 
                alert("DEFEAT! Try again."); 
            }
            location.reload();
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function openOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
