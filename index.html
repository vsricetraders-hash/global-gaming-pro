<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Pro Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap');
        body { background: #030303; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .page-content { display: none; padding-bottom: 120px; }
        .page-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #3b82f6 !important; filter: drop-shadow(0 0 8px #3b82f6); }
        #gameArena { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        canvas { background: #050505; display: block; margin: 0 auto; border-radius: 30px; border: 1px solid #3b82f6; }
    </style>
</head>
<body>

    <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xl font-black italic text-blue-500 tracking-tighter" style="font-family:'Syncopate'">NEXUS<span class="text-white font-normal">PRO</span></h1>
        <div onclick="showPage('wallet')" class="glass px-4 py-2 rounded-2xl border border-blue-500/30 flex items-center gap-2 active:scale-90 transition">
            <span class="text-[10px] font-black text-blue-400">₹0.00</span>
            <div class="bg-blue-600 rounded-full w-4 h-4 flex items-center justify-center"><i class="fa-solid fa-plus text-[8px]"></i></div>
        </div>
    </nav>

    <main class="mt-24 px-6">
        <div id="games" class="page-content active">
            <h2 class="text-[10px] font-black text-gray-500 mb-6 tracking-[0.4em] uppercase">Battle Arena</h2>
            <div class="glass p-6 rounded-[2.5rem] mb-6 border-l-4 border-blue-500">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-2xl font-black italic uppercase mb-1">Cyber Jump</h3>
                        <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest leading-none italic">Hard Mode Active</p>
                    </div>
                    <i class="fa-solid fa-bolt text-2xl text-blue-500"></i>
                </div>
                <div class="flex gap-4">
                    <button onclick="initGame()" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/10">Practice</button>
                    <button onclick="alert('Join Battle: Entry ₹10')" class="flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-blue-500/20">₹10 Battle</button>
                </div>
            </div>
        </div>

        <div id="wallet" class="page-content text-center">
            <div class="glass p-12 rounded-[3rem] mb-8 border-b-4 border-blue-500 bg-gradient-to-br from-blue-900/10 to-transparent">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest italic">Net Balance</p>
                <h1 class="text-6xl font-black italic tracking-tighter">₹0.00</h1>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="alert('Payment Gateway Opening...')" class="bg-blue-600 py-5 rounded-[1.5rem] font-black uppercase text-xs">Add Cash</button>
                <button class="glass py-5 rounded-[1.5rem] font-black uppercase text-xs">Withdraw</button>
            </div>
        </div>

        <div id="vip" class="page-content">
            <div class="glass p-8 rounded-[3rem] mb-8 bg-gradient-to-br from-yellow-900/20 to-transparent border-l-4 border-yellow-500">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 bg-yellow-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg shadow-yellow-500/20"><i class="fa-solid fa-crown text-black"></i></div>
                    <div>
                        <h2 class="text-xl font-black italic uppercase italic tracking-tighter">Elite Member</h2>
                        <p class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest">Level 1 • Bronze</p>
                    </div>
                </div>
                <div class="bg-white/5 h-2 rounded-full mb-2"><div class="bg-yellow-500 h-full rounded-full w-[15%]"></div></div>
                <p class="text-[8px] text-gray-500 font-bold uppercase tracking-widest italic">₹850 to next tier</p>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 inset-x-0 glass px-10 py-5 flex justify-between items-center z-[100] border-t border-white/5">
        <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active transition">
            <i class="fa-solid fa-gamepad text-lg"></i><span class="text-[7px] font-black uppercase">Arena</span>
        </button>
        <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition">
            <i class="fa-solid fa-wallet text-lg"></i><span class="text-[7px] font-black uppercase">Wallet</span>
        </button>
        <button onclick="showPage('vip')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition">
            <i class="fa-solid fa-crown text-lg"></i><span class="text-[7px] font-black uppercase">VIP</span>
        </button>
    </footer>

    <div id="gameArena">
        <div class="p-8 flex justify-between items-center mt-4">
            <div class="glass px-6 py-2 rounded-2xl border-blue-500/40"><span id="liveScore" class="text-4xl font-black text-blue-500 italic">0</span></div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-2xl text-[10px] font-black uppercase border border-red-500/20">Quit</button>
        </div>
        <canvas id="mainCanvas"></canvas>
        <p class="text-center mt-10 text-[9px] text-gray-600 font-black tracking-[0.5em] animate-pulse uppercase italic">Tap to Jump</p>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('nav-active'); event.currentTarget.classList.remove('text-gray-500');
        }

        function initGame() {
            document.getElementById('gameArena').style.display = 'block';
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 60; canvas.height = 400;

            let p = {y:350, dy:0}, obs = [], score = 0, frame = 0;
            let gameSpeed = 5; // Start Speed
            let spawnRate = 90; // Start Gap

            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                
                // --- DIFFICULTY LOGIC ---
                if (score > 5) gameSpeed = 6.5;
                if (score > 12) gameSpeed = 8;
                if (score > 20) gameSpeed = 10;
                if (score > 10) spawnRate = 75;
                // ------------------------

                p.dy += 0.7; p.y += p.dy;
                if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
                ctx.fillRect(50, p.y, 35, 35); ctx.shadowBlur = 0;

                if(frame % Math.floor(spawnRate) === 0) obs.push({x:canvas.width, w:30, h:45});
                obs.forEach((o, i) => {
                    o.x -= gameSpeed;
                    ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, o.h);
                    if(50 < o.x + o.w - 5 && 85 > o.x + 5 && p.y > 310) { 
                        alert("Session Ended! Score: " + score); location.reload(); 
                    }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                frame++; requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', (e) => { e.preventDefault(); if(p.y >= 340) p.dy = -13; });
            draw();
        }
    </script>
</body>
</html>
