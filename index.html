<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Admin Empowered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { background: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #0f172a 40%, #020617 100%); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(35px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page-content { display: none; height: 85vh; overflow-y: auto; padding-bottom: 180px; scrollbar-width: none; }
        .page-content.active { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: #3b82f6 !important; filter: drop-shadow(0 0 10px #3b82f6); }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.99); z-index: 2000; padding: 25px; }
        .battle-card { background: linear-gradient(145deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0) 100%); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <div id="authScreen" class="fixed inset-0 z-[3000] bg-[#020617] p-8 flex flex-col justify-center">
        <h1 class="text-4xl font-black italic text-blue-500 uppercase mb-8 nexus-logo" style="font-family:'Syncopate'">NexusPro</h1>
        <div class="space-y-6">
            <input id="userName" type="text" placeholder="Enter Username" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            <input id="userPhone" type="number" placeholder="Mobile Number" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-blue-500">
            <button onclick="loginUser()" class="w-full bg-blue-600 py-6 rounded-3xl font-black uppercase text-xs">Login to Arena</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-5 flex justify-between items-center">
            <h1 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter" style="font-family:'Syncopate'">NexusPro</h1>
            <div onclick="showPage('wallet')" class="bg-blue-600/10 border border-blue-500/30 px-4 py-2 rounded-2xl flex items-center gap-2">
                <span id="displayBal" class="text-xs font-black text-blue-400">₹0.00</span>
                <div class="bg-blue-600 rounded-full w-4 h-4 flex items-center justify-center"><i class="fa-solid fa-plus text-[8px]"></i></div>
            </div>
        </nav>

        <main class="mt-28 px-6">
            <div id="games" class="page-content active">
                <div class="battle-card p-6 rounded-[2.5rem] border-l-4 border-blue-500 mb-6">
                    <h3 class="text-xl font-black italic uppercase mb-4">Cyber Jump</h3>
                    <div class="flex gap-3">
                        <button onclick="initGame()" class="flex-1 glass py-4 rounded-2xl text-[10px] font-black uppercase">Practice</button>
                        <button onclick="openOverlay('depositOverlay')" class="flex-1 bg-blue-600 py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg">₹10 Play</button>
                    </div>
                </div>
            </div>

            <div id="wallet" class="page-content text-center">
                <div class="glass p-12 rounded-[3.5rem] mb-8 border-b-4 border-blue-500 bg-gradient-to-br from-blue-900/10 to-transparent">
                    <p class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest italic">Net Balance</p>
                    <h1 id="wallBal" class="text-6xl font-black italic tracking-tighter">₹0.00</h1>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="openOverlay('depositOverlay')" class="bg-blue-600 py-6 rounded-[2rem] font-black uppercase text-xs">Add Cash</button>
                    <button onclick="openOverlay('withdrawOverlay')" class="glass py-6 rounded-[2rem] font-black uppercase text-xs">Withdraw</button>
                </div>
            </div>

            <div id="vip" class="page-content">
                <div class="battle-card p-8 rounded-[3rem] mb-8 border-l-4 border-yellow-500" onclick="checkAdminClick()">
                    <h2 id="helloUser" class="text-xl font-black italic uppercase mb-2">User</h2>
                    <p class="text-[10px] text-yellow-500 font-black uppercase">Bronze Tier</p>
                </div>
                <button onclick="logout()" class="w-full glass py-4 rounded-2xl text-[10px] font-black uppercase text-red-500">Logout</button>
            </div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 glass px-12 py-7 flex justify-between items-center z-[150] rounded-t-[3.5rem] border-t border-white/5">
            <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active transition"><i class="fa-solid fa-gamepad text-2xl"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
            <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition"><i class="fa-solid fa-wallet text-2xl"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
            <button onclick="showPage('vip')" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transition"><i class="fa-solid fa-crown text-2xl"></i><span class="text-[7px] font-black uppercase">Account</span></button>
        </footer>
    </div>

    <div id="adminOverlay" class="overlay">
        <div class="flex justify-between items-center mb-10"><h2 class="text-2xl font-black italic text-red-500 uppercase">Admin Panel</h2><button onclick="closeOverlay('adminOverlay')"><i class="fa-solid fa-xmark text-2xl"></i></button></div>
        <div class="space-y-6">
            <p class="text-[10px] text-gray-500 font-bold uppercase italic tracking-widest">Update User Balance Manually</p>
            <input id="adminUser" type="text" placeholder="Target Username" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-red-500">
            <input id="adminAmount" type="number" placeholder="New Balance Amount" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-black italic outline-none focus:border-red-500">
            <button onclick="updateBalanceByAdmin()" class="w-full bg-red-600 py-6 rounded-3xl font-black uppercase text-xs">Update Now</button>
        </div>
    </div>

    <div id="depositOverlay" class="overlay">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black italic text-blue-500 uppercase italic">Add Money</h2><button onclick="closeOverlay('depositOverlay')"><i class="fa-solid fa-xmark text-2xl"></i></button></div>
        <div class="glass p-8 rounded-[3rem] border-dashed border-blue-500/40 text-center mb-8">
            <p class="text-[10px] text-gray-400 font-black uppercase mb-4 italic tracking-widest">9336258808@ptaxis</p>
            <button onclick="alert('UPI Copied!')" class="bg-blue-600 px-10 py-4 rounded-full text-[10px] font-black uppercase">Copy UPI</button>
        </div>
        <p class="text-center text-[10px] text-gray-500 italic mb-6 uppercase">Send Screenshot to WhatsApp: 7309433678</p>
    </div>

    <script>
        // --- CORE LOGIC (NO SUPABASE) ---
        let adminClicks = 0;

        function loginUser() {
            const name = document.getElementById('userName').value;
            if(!name) return alert("Username dalo bhai!");
            localStorage.setItem('nexus_user', name);
            if(!localStorage.getItem(name + '_bal')) localStorage.setItem(name + '_bal', '0.00');
            location.reload();
        }

        window.onload = () => {
            const user = localStorage.getItem('nexus_user');
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('helloUser').innerText = user;
                updateUIBalance();
            }
        }

        function updateUIBalance() {
            const user = localStorage.getItem('nexus_user');
            const bal = localStorage.getItem(user + '_bal') || '0.00';
            document.getElementById('displayBal').innerText = "₹" + bal;
            document.getElementById('wallBal').innerText = "₹" + bal;
        }

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('nav-active'); b.classList.add('text-gray-500'); });
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('nav-active');
            event.currentTarget.classList.remove('text-gray-500');
        }

        // --- ADMIN POWERS ---
        function checkAdminClick() {
            adminClicks++;
            if(adminClicks >= 5) {
                openOverlay('adminOverlay');
                adminClicks = 0;
            }
        }

        function updateBalanceByAdmin() {
            const targetUser = document.getElementById('adminUser').value;
            const amount = document.getElementById('adminAmount').value;
            if(!targetUser || !amount) return alert("Details bharo!");
            
            // Ye user ke local storage mein save hoga (Lekin real life mein tujhe user ka phone chahiye hoga)
            // Solution: For testing, ye tumhare phone par tumhara balance update kar dega
            localStorage.setItem(targetUser + '_bal', amount);
            alert("Balance Updated for " + targetUser);
            updateUIBalance();
            closeOverlay('adminOverlay');
        }

        function openOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.removeItem('nexus_user'); location.reload(); }

        // --- GAME ENGINE ---
        function initGame() {
            alert("Game Started!");
            // (Same Game Logic as before...)
        }
    </script>
</body>
</html>
