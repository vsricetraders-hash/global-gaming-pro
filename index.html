<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS PRO | Skill-Based Esports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #030303; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-active { color: #3b82f6 !important; }
        .page-content { display: none; padding-bottom: 100px; }
        .page-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #gameArena { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        canvas { background: #050505; display: block; margin: 0 auto; border-radius: 24px; border: 1px solid #3b82f6; }
    </style>
</head>
<body>

    <nav class="fixed top-0 inset-x-0 z-[100] glass px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black italic text-blue-500">NEXUS<span class="text-white font-normal">PRO</span></h1>
        <div onclick="showPage('wallet')" class="bg-blue-600/20 border border-blue-500/30 px-4 py-1.5 rounded-full flex items-center gap-2">
            <span id="topBalance" class="text-xs font-black text-blue-400">₹0.00</span>
            <i class="fa-solid fa-plus-circle text-blue-500"></i>
        </div>
    </nav>

    <main class="mt-24 px-5">
        <div id="games" class="page-content active">
            <h2 class="text-xl font-black mb-6 italic border-l-4 border-blue-500 pl-3 uppercase">Skill Battles</h2>
            
            <div class="glass p-5 rounded-[2.5rem] mb-4 border-l-4 border-blue-500">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h4 class="font-black uppercase italic">Cyber Jump</h4>
                        <p class="text-[9px] text-gray-500 font-bold uppercase">Game of Skill • Fair Play</p>
                    </div>
                    <span class="text-[8px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-black">LIVE</span>
                </div>
                <div class="flex gap-3">
                    <button onclick="initGame()" class="flex-1 glass py-3 rounded-xl text-[10px] font-black uppercase">Practice</button>
                    <button onclick="checkBalance(10)" class="flex-1 bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-500/20">₹10 Battle</button>
                </div>
            </div>

            <div class="glass p-5 rounded-[2.5rem] opacity-50 border-l-4 border-gray-600">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h4 class="font-black uppercase italic">Reflex Master</h4>
                        <p class="text-[9px] text-gray-500 font-bold">Coming Soon</p>
                    </div>
                    <i class="fa-solid fa-lock text-gray-600"></i>
                </div>
            </div>
        </div>

        <div id="wallet" class="page-content text-center">
            <div class="glass p-12 rounded-[3rem] mb-8 border-b-4 border-green-500">
                <p class="text-[10px] text-gray-500 font-black uppercase mb-2 tracking-widest">Available Balance</p>
                <h1 id="mainBalance" class="text-6xl font-black italic">₹0.00</h1>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="alert('Redirecting to Payment Gateway...')" class="bg-blue-600 py-5 rounded-[1.5rem] font-black uppercase text-xs">Add Cash</button>
                <button onclick="alert('Minimum Withdrawal ₹100')" class="glass py-5 rounded-[1.5rem] font-black uppercase text-xs">Withdraw</button>
            </div>
            <p class="text-[9px] text-gray-600 font-bold uppercase italic tracking-tighter">Certified Skill-Based Platform</p>
        </div>
    </main>

    <footer class="fixed bottom-0 inset-x-0 glass px-6 py-4 flex justify-between items-center z-[100]">
        <button onclick="showPage('games')" class="nav-btn flex flex-col items-center gap-1 nav-active"><i class="fa-solid fa-gamepad"></i><span class="text-[7px] font-black uppercase">Arena</span></button>
        <button onclick="showPage('wallet')" class="nav-btn flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-wallet"></i><span class="text-[7px] font-black uppercase">Wallet</span></button>
        <button onclick="alert('Login System Syncing...')" class="nav-btn flex flex-col items-center gap-1 text-gray-500"><i class="fa-solid fa-user"></i><span class="text-[7px] font-black uppercase">Profile</span></button>
    </footer>

    <div id="gameArena">
        <div class="p-6 mt-4 flex justify-between items-center">
            <h2 id="liveScore" class="text-3xl font-black text-blue-500 italic">0</h2>
            <button onclick="location.reload()" class="bg-red-500/20 text-red-500 px-6 py-2 rounded-full text-[10px] font-black uppercase">Quit</button>
        </div>
        <canvas id="mainCanvas"></canvas>
    </div>

    <script>
        // --- DATA SYNC (SUPABASE) ---
        const SB_URL = 'https://kqjgnbtrrvuqrnpquiut.supabase.co';
        const SB_KEY = 'sb_publishable_IDUG0HJGESoGB5grcECqcQ_zTrs4e83';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function syncBalance() {
            // Hum abhi ke liye test user 'Shiva_thakur' use kar rahe hain
            const { data } = await supabase.from('profiles').select('balance').eq('username', 'Shiva_thakur').single();
            if(data) {
                const b = parseFloat(data.balance).toFixed(2);
                document.getElementById('topBalance').innerText = "₹" + b;
                document.getElementById('mainBalance').innerText = "₹" + b;
            }
        }
        setInterval(syncBalance, 5000); // Har 5 sec mein balance update

        function showPage(pId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-500', 'nav-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(pId).classList.add('active');
            event.currentTarget.classList.add('nav-active');
            event.currentTarget.classList.remove('text-gray-500');
        }

        function initGame() {
            document.getElementById('games').style.display = 'none';
            document.getElementById('gameArena').style.display = 'block';
            startJump();
        }

        function startJump() {
            const canvas = document.getElementById('mainCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth - 40; canvas.height = 400;
            let p = {y:350, dy:0}, obs = [], score = 0, frame = 0;
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                p.dy += 0.6; p.y += p.dy;
                if(p.y > 350) p.y = 350;
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(50, p.y, 32, 32);
                if(frame % 90 === 0) obs.push({x:canvas.width, w:30});
                obs.forEach((o, i) => {
                    o.x -= 5; ctx.fillStyle = '#ff4444'; ctx.fillRect(o.x, 350, o.w, 35);
                    if(50 < o.x + o.w - 5 && 82 > o.x + 5 && p.y > 320) { alert("Score Saved! " + score); location.reload(); }
                    if(o.x + o.w < 0) { obs.splice(i, 1); score++; }
                });
                document.getElementById('liveScore').innerText = score;
                frame++; requestAnimationFrame(draw);
            }
            window.addEventListener('touchstart', (e) => { e.preventDefault(); if(p.y >= 340) p.dy = -12; });
            draw();
        }
    </script>
</body>
</html>
